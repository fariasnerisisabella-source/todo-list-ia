<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Controle de Tarefas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input, select, button {
      padding: 10px;
      margin: 5px;
    }

    .tasks {
      margin-top: 20px;
    }

    .category {
      margin-bottom: 20px;
    }

    .task {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    .completed {
      text-decoration: line-through;
      color: gray;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Controle de Tarefas</h1>

    <input type="text" id="taskInput" placeholder="Digite a tarefa">
    <select id="categorySelect">
      <option value="cotidiano">Cotidiano</option>
      <option value="trabalho">Trabalho</option>
    </select>
    <button onclick="addTask()">Adicionar</button>

    <div class="tasks">
      <div class="category">
        <h2>Cotidiano</h2>
        <div id="cotidiano"></div>
      </div>

      <div class="category">
        <h2>Trabalho</h2>
        <div id="trabalho"></div>
      </div>
    </div>
  </div>

  <script>
    let tasks = [];

    function addTask() {
      const input = document.getElementById("taskInput");
      const category = document.getElementById("categorySelect").value;

      if (input.value.trim() === "") return;

      const task = {
        id: Date.now(),
        text: input.value,
        category: category,
        completed: false
      };

      tasks.push(task);
      input.value = "";

      renderTasks();
    }

    function toggleTask(id) {
      tasks = tasks.map(task => {
        if (task.id === id) {
          return { ...task, completed: !task.completed };
        }
        return task;
      });

      renderTasks();
    }

    function renderTasks() {
      document.getElementById("cotidiano").innerHTML = "";
      document.getElementById("trabalho").innerHTML = "";

      tasks.forEach(task => {
        const taskDiv = document.createElement("div");
        taskDiv.className = "task";

        if (task.completed) {
          taskDiv.classList.add("completed");
        }

        taskDiv.innerHTML = `
          <span>${task.text}</span>
          <button onclick="toggleTask(${task.id})">
            ${task.completed ? "Desfazer" : "Concluir"}
          </button>
        `;

        document.getElementById(task.category).appendChild(taskDiv);
      });
    }
  </script>
</body>
</html>
